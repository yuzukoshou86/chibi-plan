<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>おでかけスケジュール</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">

    <section id="homeScreen" class="screen active">
      <div class="hero">
        <div class="leaf">🌱</div>
        <h1>今日はどこいく？</h1>
        <p>気分に合わせて、ちいさなおでかけを作ろう</p>

        <button id="startBtn" class="main-btn">スケジュールを作る</button>

        <div class="home-menu">
          <button>オススメ提案</button>
          <button>マイページ</button>
        </div>
      </div>
    </section>

    <section id="conditionScreen" class="screen">
      <h2>どんなおでかけにする？</h2>

      <div class="card">
        <p class="card-title">今日はどんな一日にしたい？</p>
        <div class="check-grid">
          <label class="check-item"><input type="checkbox" name="dayMood" value="癒されたい"> 🌿 癒されたい</label>
          <label class="check-item"><input type="checkbox" name="dayMood" value="ワクワクしたい"> ✨ ワクワクしたい</label>
          <label class="check-item"><input type="checkbox" name="dayMood" value="リフレッシュしたい"> 🍃 リフレッシュしたい</label>
          <label class="check-item"><input type="checkbox" name="dayMood" value="学び・体験を楽しみたい"> 🎨 学び・体験を楽しみたい</label>
          <label class="check-item"><input type="checkbox" name="dayMood" value="思い出を作りたい"> 💛 思い出を作りたい</label>
          <label class="check-item"><input type="checkbox" name="dayMood" value="アクティブに過ごしたい"> 💪 アクティブに過ごしたい</label>
        </div>
      </div>

      <div class="card">
        <p class="card-title">どんな感覚を楽しみたい？</p>
        <div class="check-grid">
          <label class="check-item"><input type="checkbox" name="senseMood" value="綺麗な景色に出会いたい"> 👀 綺麗な景色に出会いたい</label>
          <label class="check-item"><input type="checkbox" name="senseMood" value="心地よい香りに出会いたい"> 👃 心地よい香りに出会いたい</label>
          <label class="check-item"><input type="checkbox" name="senseMood" value="心地よい音に出会いたい"> 👂 心地よい音に出会いたい</label>
          <label class="check-item"><input type="checkbox" name="senseMood" value="心地よい感覚に出会いたい"> 🤲 心地よい感覚に出会いたい</label>
          <label class="check-item"><input type="checkbox" name="senseMood" value="美味しい味に出会いたい"> 👅 美味しい味に出会いたい</label>
          <label class="check-item"><input type="checkbox" name="senseMood" value="おまかせ" id="senseRandom"> 🎲 おまかせ</label>
        </div>
      </div>

      <div class="card">
        <label for="startPlace">出発地</label>
        <input id="startPlace" type="text" placeholder="例：大阪駅" />
      </div>

      <div class="card">
        <label for="peopleRange">人数</label>
        <div class="range-row">
          <input id="peopleRange" type="range" min="1" max="10" value="1" />
          <span id="peopleText">1人</span>
        </div>
      </div>

      <div class="card schedule-card">
        <p class="card-title">予定</p>

        <div class="select-row">
          <button class="trip-type selected" data-type="day">日帰り</button>
          <button class="trip-type" data-type="stay">お泊まり</button>
        </div>

        <div id="stayOptions" class="option-box">
          <label for="stayNights">何泊？</label>
          <select id="stayNights">
            <option value="1泊2日">1泊2日</option>
            <option value="2泊3日">2泊3日</option>
            <option value="3泊4日">3泊4日</option>
            <option value="4泊以上">4泊以上</option>
          </select>

          <div class="hotel-check">
            <span>宿泊先も提案する？</span>
            <div>
              <button class="hotel-btn selected">する</button>
              <button class="hotel-btn">しない</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <p class="card-title">おでかけ時間</p>

        <div class="select-row">
          <button class="start-type selected" data-start-type="now">今から出発</button>
          <button class="start-type" data-start-type="select">時間を指定する</button>
        </div>

        <div id="startTimeBox" class="time-box hidden">
          <label for="startTime">出発時間</label>
          <select id="startTime"></select>
        </div>

        <div class="time-box">
          <label for="endTime">終了時間</label>
          <select id="endTime"></select>
        </div>

        <p class="helper-text">出発地点を出てから、出発地点へ戻るまでの時間です。</p>
      </div>

      <div class="card">
        <label for="budgetRange">予算</label>
        <div class="range-row">
          <input id="budgetRange" type="range" min="1000" max="50000" step="1000" value="10000" />
          <span id="budgetText">10,000円</span>
        </div>
      </div>

      <p id="formMessage" class="form-message">すべての項目を入力してください。</p>

      <button id="makePlanBtn" class="main-btn" disabled>
        スケジュール作成
      </button>

      <div id="promptResult" class="prompt-result">
        <p class="prompt-placeholder">ここに生成されたJSONが表示されます。</p>
      </div>
    </section>

    <section id="proposalScreen" class="screen">
      <div class="proposal-header">
        <button id="backBtn" class="back-btn">← 戻る</button>
        <div>
          <h2>おすすめプラン</h2>
          <p id="proposalLead">雨の日にもおすすめ！近場で気軽に楽しめるプラン</p>
        </div>
      </div>

      <div class="proposal-area">
        <div class="plan-card">
          <p class="area-label">大阪エリア</p>
          <h3>プランA</h3>
          <p>ここにスケジュール内容を表示</p>
        </div>

        <div class="plan-card">
          <p class="area-label">神戸エリア</p>
          <h3>プランB</h3>
          <p>ここにスケジュール内容を表示</p>
        </div>

        <div class="plan-card">
          <p class="area-label">京都エリア</p>
          <h3>プランC</h3>
          <p>ここにスケジュール内容を表示</p>
        </div>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
