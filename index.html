<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>おでかけスケジュール</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">

    <!-- ホーム画面 -->
    <section id="homeScreen" class="screen active">
      <div class="hero">
        <div class="leaf">🌱</div>
        <h1>今日はどこいく？</h1>
        <p>気分に合わせて、ちいさなおでかけを作ろう</p>

        <button id="startBtn" class="main-btn">
          スケジュールを作る
        </button>

        <div class="home-menu">
          <button>オススメ提案</button>
          <button>マイページ</button>
        </div>
      </div>
    </section>

    <!-- 条件設定画面 -->
    <section id="conditionScreen" class="screen">
      <h2>どんなおでかけにする？</h2>

      <div class="card">
        <label>どんな気分？</label>
        <div class="mood-grid">
          <button class="mood">癒されたい</button>
          <button class="mood">美味しいもの食べたい</button>
          <button class="mood">自然を見たい</button>
          <button class="mood">体を動かしたい</button>
          <button class="mood">誰かと遊びたい</button>
          <button class="mood">非日常を味わいたい</button>
        </div>
      </div>

      <div class="card">
        <label for="startPlace">出発地</label>
        <input id="startPlace" type="text" placeholder="例：大阪駅" />
      </div>

      <div class="card">
        <label for="peopleRange">人数</label>
        <div class="range-row">
          <input id="peopleRange" type="range" min="1" max="10" value="1" />
          <span id="peopleText">1人</span>
        </div>
      </div>

      <div class="card schedule-card">
  <label>予定</label>

  <div class="select-row">
    <button class="trip-type selected" data-type="day">日帰り</button>
    <button class="trip-type" data-type="stay">お泊まり</button>
  </div>

  <div id="dayOptions" class="option-box active">
    <label>何時間？</label>
    <select id="dayHours">
      <option>1〜2時間</option>
      <option>3〜4時間</option>
      <option>5〜6時間</option>
      <option>半日</option>
      <option>朝から夜まで</option>
    </select>
  </div>

  <div id="stayOptions" class="option-box">
    <label>何泊？</label>
    <select id="stayNights">
      <option>1泊2日</option>
      <option>2泊3日</option>
      <option>3泊4日</option>
      <option>4泊以上</option>
    </select>

    <div class="hotel-check">
      <span>宿泊先も提案する？</span>
      <div>
        <button class="hotel-btn selected">する</button>
        <button class="hotel-btn">しない</button>
      </div>
    </div>
  </div>
</div>

      <div class="card">
        <label for="budgetRange">予算</label>
        <div class="range-row">
          <input id="budgetRange" type="range" min="1000" max="50000" step="1000" value="10000" />
          <span id="budgetText">10,000円</span>
        </div>
      </div>

      <button id="makePlanBtn" class="main-btn">
        提案してもらう
      </button>
    </section>

    <!-- 提案画面 -->
    <section id="proposalScreen" class="screen">
      <div class="proposal-header">
        <button id="backBtn" class="back-btn">← 戻る</button>
        <div>
          <h2>おすすめプラン</h2>
          <p id="proposalLead">雨の日にもおすすめ！近場で気軽に楽しめるプラン</p>
        </div>
      </div>

      <div class="proposal-area">
        <div class="plan-card">
          <p class="area-label">大阪エリア</p>
          <h3>プランA</h3>
          <p>ここにスケジュール内容を表示</p>
        </div>

        <div class="plan-card">
          <p class="area-label">神戸エリア</p>
          <h3>プランB</h3>
          <p>ここにスケジュール内容を表示</p>
        </div>

        <div class="plan-card">
          <p class="area-label">京都エリア</p>
          <h3>プランC</h3>
          <p>ここにスケジュール内容を表示</p>
        </div>
      </div>
    </section>

  </main>
  <script src="prompt.js"></script>
  <script src="script.js"></script>
</body>
</html>
